front:
  text: 九天應元雷聲普化天尊玉樞寳經集註上
  hash: sha256:c9441e60a9ac0fd607a33ea0f21d72afef3da3682c9ed4ec6ff583fe46cce54b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0100_HFL_000-001a, image: hfl/0050/0050-034.png}
body:
  text: 海瓊白眞人注祖天師張眞君解義五雷使者張天君釋純陽孚佑帝君讃註曰九者陽數也乃天道也主於震宫故東南有九炁之說也即雷師出入之地也天者至大至聖无極無爲之炁也應者無物不承天命而生也元者至大也又曰萬善之長也乃四時之首也五行之先也雷者乃天令也掌生生殺殺之權動靜人莫可測萬神之奉行也聲者生也萬物得雷震聲而萌也又曰天不言以雷代言也普者上天下地四維八荒無形有形也化者天道隂陽運行則爲化又自無而有自有而無則爲化萬物生息則爲化老子云我無爲而民自化又云以德化是也天尊者至大至貴之稱也說者讃揚也闡教也解隱釋奥也玉者天地日月之精華隂陽水火之結秀也潤而温寳而貴萬載之不可朽滅也樞者機也軸也乃生殺之始由也寳者珍重也經者徑也乃修眞入道之要路也義曰斯經以玉樞而名者乃天地之消息隂陽之動靜也元數乃乾元用九之説而普化天尊居其上爲三界之尊十方之靈明矣釋曰天尊發願廣大化及羣生其德不可量而機不可測也故以雷聲代化玉樞爲𢖍則善善惡惡殺殺生生皆聽於九炁之眞王所以三界萬靈十方諸天莫不皆賛我天尊之元化也讃曰祖炁氤氲滿太虚九天元是九天居驅雷役雨飛金篆活物生人備玉樞三界有情同得道十方無路不通車大哉普化明元始日月齊光信不誣爾時九天應元雷聲普化天尊註曰九天者乃統三十六天之總司也始因東南九炁而生正出雷門所以掌三十六雷之令受諸司府院之印生善殺惡不順人情蓋以九天之名者取其陽剛而不泯者之謂也應元者仰惟元始祖劫一炁分眞玉清眞王應元之體雷者隂陽二炁結而成雷既有雷霆遂分部隷九天雷祖因之以剖析爲五屬神霄眞王用之以宰御三界眞王所居神霄玉府其道在乎巽巽者天中之地也東南乃九陽之炁結清朗光元始父祖化神霄玉清眞王玉府在碧霄梵炁之中去雷城二千三百里雷城髙八十一丈左有玉樞五雷使院右有玉府五雷使院天有四方四隅分爲九霄惟此一霄居於梵炁之中在心曰神故曰神霄乃眞王按治之所天尊臨蒞之都卿師使相列職分司主天之災福持物之權𢖍掌物掌人司生司殺檢押啓閉管鑰生成上自天皇下自地帝非雷霆無以行其令大而生死小而枯榮非雷霆無以主其政雷霆政令其所隷焉三清上聖雷霆祖也十極至尊雷霆本也昊天玉皇上帝號令雷霆也后土皇地祇節制雷霆也北極紫微大帝掌握五雷也五雷者天雷地雷水雷龍雷社令雷又有十雷一曰玉樞雷二曰神霄雷三曰大洞雷四曰仙都雷五曰北極雷六曰太乙雷七曰紫府雷八曰玉晨雷九曰太霄雷十曰太極雷又有三十六雷一曰玉樞雷二曰玉府雷三曰玉柱雷四曰上清大洞雷五曰火輪雷六曰灌斗雷七曰風火雷八曰飛捷雷九曰北極雷十曰紫微璿樞雷十一曰神霄雷十二曰仙都雷十三曰太乙轟天雷十四曰紫府雷十五曰鐵甲雷十六曰邵陽雷十七曰歘火雷十八社令蠻雷十九曰地祇鳴雷二十曰三界雷二十一曰斬壙雷二十二曰大威雷二十三曰六波雷二十四曰青草雷二十五曰八卦雷二十六曰混元鷹犬雷二十七曰嘯命風雷二十八曰火雲雷二十九曰禹歩大統攝雷三十曰太極雷三十一曰劒火雷三十二曰内鑑雷三十三曰外鑑雷三十四曰神府天樞雷三十五曰大梵斗樞雷三十六曰玉晨雷有三十六神曩嘗陳之於太上之前雷法有七十二階天地賞善罰惡發生萬物皆雷也雖隂陽之激剥亦由神人之興動雷鳴則雨降矣聲者天地之仁聲也春分五日雷乃發聲可聞百里震九天而動九地驚四海而飜四溟太上曰吾不發隂陽之聲吾之大音無以召故鼓之以雷霆以聲召氣也雷帝之前有雷鼔三十六面凡行雷之時雷帝親擊本部雷鼓一下即時雷公雷神興發雷聲也普化天尊者自浮黎元始天尊生九子玉清眞王化生雷聲普化天尊天尊以歷劫應化隨時示號本元始祖劫一炁分眞乃玉清眞王九霄主宰一月四辰監觀萬天浮遊三界九州萬國賞善録愆是爲普化至大至貴也義曰九天雖曰乾數陽剛而不柔實乃九炁之生處也於是結英聚靈成我玉清眞王之化形也應元者天地一炁隂陽五行上布下流無一物不承天命而得隂陽之炁以所生也故曰應元又何疑矣雷之爲雷大矣哉故三界十方天聖地眞各有司焉惟九天玉清眞王總治其令也聲乃炁之用炁乃聲之令明是辯非震萌起蟄非雷之令何能生也普化天尊者天即我我即天發願廣大化形十方凡諸衆生能皈心向道我當以身身之非天尊普化而何釋曰是時九炁成形結爲九天在三十六天之上十方三界之祖炁也所以用九之故其炁元本乎三清之體而用乎九天之名宜矣應元者天陽地隂理之然也蓋我天尊生乎陽而居於天其健而剛也所以萬物生乎地莫不皆聽命於天尊使物物各得其宜世人不知其故而本元皆出乎天尊之餘炁也天尊欲人人皆爲天尊者何故惜其炁而應其本元之妙道也雷者類也是以出萬類而起羣品也孰不知雷乃隂陽二炁之激剥却有所司馘惡誅邪驅風役雨者何耶凡俗無知豈識元始生殺之機玉清眞王之妙用也聲者令也聽也天無聲則雷霆不行地無聲則草木不萌人無聲則清濁難明所以聲爲一身之本乃隂陽之元炁也天無私日月垂明天有德人物俱生是故我天尊代天行道德施三界使清者爲聖濁者爲賢凡諸有情有形者俾躋仙阼共成一炁讃曰九天九天玄之又玄忽爾我後倏焉我前右九天二炁雖分隂與陽玉清髙處化眞王上天下地能相合閳教分形徧十方右應元二炁之正五行之令斬鬼誅邪天人響應右雷廣宣帝德起羣生三界英靈側耳聽莫道老天無一語須知司令有雷鳴右聲好生之德不能量闡教諸天及十方髙處玉清治雷府萬神朝服禮眞王右化普在玉清天中與十方諸天帝君㑹於玉虚九光之殿鬰蕭彌羅之舘紫極曲密之房閱太幽碧瑶之笈考洞微明晨之書交頭接耳細議重玄諸多陪臣左右踧踖天尊宴坐朗誦洞章諸天帝君長吟歩虚綵女仙姝散花旋繞復相引領遊戲翠宫羣仙導前先節後鉞龍旂鸞輅飄颻太空並集於玉梵七寳層臺註曰在者其時也天尊遊於玉清天中與十方諸天帝君宴會於玉虚殿舘紫極之房是時天尊檢觀太幽碧瑶之箱稽考洞微明晨之紀交頭接耳者蓋諸天帝君列坐有次聖聖相傳共聽微密玄玄之言彼時諸天帝君亦各有衆多家臣左右踧踖恭謹侍焉天尊安然髙座朗誦洞章諸天帝君深有所悟各各起座長吟歩虚讃詠天尊之教綵女仙姝散花盤繞於天尊之座復請天尊徃詣翠宫之七寳層臺欲望天尊大演妙法也層臺即龍鳳之座有七級皆珍寳飾之故名七寳層臺天尊駕興白鶴師子威儀節仗引導其前青龍白虎六甲六丁侍衞左右九天仙女十二溪眞陳奏仙樂諸天大帝神君神王太極眞人副從鳳輦龍輿經遊翠宫仙仗節鉞龍旂鸞輅飄颻太空集聚寳臺義曰是時遊玉清駐寳臺大闡玄文廣宣要語天人左右皆得開心受化而功行又崇也釋曰是時我天尊在自居之闕闕中有九光之殿舘閣房位閱法考書欲化十方天眞帝君明其大道於是天眞帝君被德服膺不知舞蹈天尊大悅欲遊外宫諸天羣仙左右前後仗鉞排旗引我天尊駐鸞輅於翠宫翠宫者玉清之行宫也雷師心懷奏疑無由以陳幸值我天尊登寳臺手舉金光明之如意俯察萬類讃曰故把玄玄一竅開十方三界應時來瓊書細閱存元炁寳笈重宣飬本胎侍女交頭心自㑹陪臣踧踖意能裁須臾演教天花舞鸞鳳飄颻七寳臺時有雷師皓翁於仙衆中越班而出面天尊前頫顖作禮勃變長跪上白天尊言天尊大慈天尊大聖爲羣生父爲萬靈師今者諸天咸此良覿適見天尊閱寳笈考瓊書於中祕𧷤不可縷計唯有玉霄一府所統三十六天内院中司東西華臺玄舘妙閣四府六院及諸有司各分曹局所以總司五雷天臨三界者也天尊至皇心親庶政此等小兆以何因縁得以趨服願告欲聞註曰雷師皓翁乃帝臣元老卿師重臣也玉霄府即髙上神霄天中玉清眞王府居三十六天之上天中有五殿東曰蘂珠西曰碧玉北曰青華南曰凝神中曰長生又有太一内院可韓中司東西二臺四曹四局外有大梵紫微之閣仙都火雷之舘皆有玉府左玄右玄金闕侍中僕射上相眞仙眞伯卿監侍宸仙郎玉郎玉童玉女左右司麾諸部雷神官君將吏上統三十六天東方八天謂髙上道寂天髙上陽歧天髙上洞光天髙上紫沖天髙上玉靈天髙上清虚天髙上微果天髙上正心天南方八天髙上道元天髙上太皇天髙上玄沖天髙上極眞天髙上梵炁天髙上輔帝天髙上玄宗天髙上歷變天西方八天髙上左罡天髙上主化天髙上符臨天髙上保華天髙上定精天髙上青華天髙上景琅天髙上丹精天北方八天髙上安墠天髙上廣宗天髙上浩帝天髙上希玄天髙上慶舍天髙上天婁天髙上變仙天髙上昇玄天東北方髙上敬皇天東南方髙上移神天西南方髙上瓊靈天西北方髙上昇極天下鎮三十六壘毎方有九陽梵炁以應一年三十六炁毎十日一炁上應天有一帝統治一炁天仙神鬼功過付與本天校勘功者列名本天過者囚於本天天獄凡善惡事三十六壘皇君奏上神霄玉府而紏察也毎天各有龍神興雷生殺伐暴誅邪罔不由之四府者九霄玉清府東極青玄府九天應元府洞淵玉府六院者太一内院玉樞院五雷院斗樞院氏陽院仙都火雷院諸有司者天部霆司蓬萊都水司太一雷霆司北帝雷霆司北斗征伐司北斗防衞司玉府雷霆九司及諸曹院子司凡世間亢陽爲虐風雨不時干戈妄動饑饉荐臻皆請命玉府經由玉樞大布分野兼判三司將兵三界鬼神功過匡濟黎民應雷霆諸司院府並佐玉樞之令禀聽施行至於雷霆斧鉞慶賞刑威有條不紊悉有分司或曰兼司行司巡察官司皆設曹局官僚任職是以玉霄一府總司五雷天臨三界者也義曰天尊以瓊書瑶笈故化天眞雷師黙㑹天尊之旨上請方便之門一時君臣體異心同無非活羣生之徑路也誦經君子至此當以雷師之心爲心其功有自歸矣釋曰時我天尊登寳臺察羣品似言不語適雷師皓翁職專雷府班越天眞以己心而識上心故白之於天尊之前我天尊德化無邊眞元有自其玄書祕籙不可條請故啓三十六天東西二臺府院諸司之政莫不皆總之於玉霄一府其雷師皓翁以此舉而發我天尊之未宣者雷師啓天尊至大至聖心及萬品臣以微陋之材以何縁由得侍玉宸願告天尊明我前劫以賛元化并玉霄一府之事當屏氣而恭聽之讃曰勃然長跪上啓眞宗諸司院府臺閣尊崇三十六所雲雷雨風何神不備何聖不從職專生殺事在吉凶欲聞至說必啓丹衷仁哉仁哉雷師皓翁天尊言雷師皓翁爾等仙卿儲勳夙世累行昨生故得玉府登庸瓊宫簡録今兹勲行視夙昨多爾其悉力雷司委心火部日復日歲復歲勳崇行著性霽神融克證髙眞即階妙道惟是雷部鬼神晝勞夕役動有捶楚大則考戮屑雲雕雪無有已時檄龍命鴉此息彼作彼所因故爾其耳焉雷師皓翁及諸天諸仙聳耳而黙天尊所坐九鳳丹霞之扆手舉金光明之如意琅風清微𦂶雲郁麗天尊寂然良久註曰雷司布令行事疾如風火不可留停降澤之處有方震雷之聲有數可旱即旱可雨即雨必奉帝勑其雷司所行鬼神何以致也蓋此等之人居塵世之上不忠不孝不仁不義不禮三寳不修五常不惜五穀所以身没之後聽我雷司之驅役實此等罪報也聞天尊所說善惡因縁雷師皓翁及諸天諸仙啓耳悚懼天尊所坐之時其神風琅琅然而清微彩雲鬰鬰然而華麗沉靜良久欲對仙衆再演玄文也義曰善根宜種惡業莫生天眞尚然累功積行何況後學君子可不盡心乎釋曰雷師皓翁與天地同體日月齊明是以天尊言儲勳夙世有大功於初始之先行既累著而得精炁遂化成形故得玉府進用瓊宫有名矣今又掌善司惡分化濟人其功不少所以盡心於火部者乃雷師皓翁之本情也加之日積月増名髙行顯以全元炁則性霽神融之不虚言也以是能與髙上眞王爲明證之臣遂列大道之階天尊以善惡兩途諭諸天眞復引雷部鬼神晝勞夕役周而復始無有休息所言屑雲謂其奔走四方搏雲作陣之勞雕雪者其冒凍乗風凝雨作花之苦也至於入海檄其龍走林命其鴉東作西止東伏西興無有息時此善惡之因故明矣天尊是時語雷師曰吾得權大化位上眞蓋心先縫此道故得如是也爾等欲昇仙阼讃化玄文以吾之功爲功則道自成矣爾今聽焉諸天帝君聞如是說皆聳耳而敬聽也天尊之威儀不可宣説即有神風𦂶雲清朗郁麗天尊與九炁復合爲一寂然而不動也讃曰善惡兩途特如影響善爲天眞惡爲魍魎天尊言吾昔於千五百劫以先心縫此道遂位上眞意醸此功遂權大化嘗於大羅元始天尊前以清凈心發廣大願願於未來世一切衆生天龍鬼神一稱吾名悉使超渙如所否者吾當以身身之爾等洗心爲爾宣説註曰心縫此道者謂如裁叚布帛若不縫就焉能爲衣且天地一㸃元炁散徧太虚六合人禀父母一㸃元炁在身即是祖宗之遺體也若修之智慧定觀清浄之心收聚七寳結成還丹是謂以心縫合成其大道而位證上眞又以天地化醇之炁大道混合沖和之妙醸成巨功遂權大化提挈天地隱顯莫測天尊於大羅元始天尊前發廣大願願一切衆生天龍鬼神一稱名者悉使超渙如所否者天尊當以身身之此足見天尊普䕶人天發弘誓願也義曰幸得人身不可蹉過當守是道而誦是經日就月將與道合體非小補哉釋曰得道之難合道之不易也我天尊昔於五百劫之初心先合此道即九炁之生形也故稱曰眞王遂掌大化我天尊曽向大羅元始天尊前以九天不雜之眞發三界無邊之願期在未來之世但受九炁之物有能歸吾化稱吾名者皆能起死回生或不信從者我當以元始一炁化成九炁以復其初也天尊謂諸天帝君曰爾等當淨其心吾今爲汝等開大道之宻緒也讃曰道乃天地心愚癡不解尋破衣要縫補須用水磨針天尊言爾諸天人欲聞至道至道深窈不在其他爾既欲聞無聞者是無聞有見即是眞道聞見亦泯惟爾而已爾尚非有何況於道不聞而聞何道可談註曰至道者不在其他在自已也爾既欲聞若明自己之道即是不必聞也是云無聞者是無聞有見即是眞道若聞他人之説自己有見即是眞道聞見亦泯皆不必聞見矣若謂非有既不聞道而欲聞不可與談道矣義曰大道無形無我無彼有無無有即是眞道也有爲有形道在何處入道之士當於無無處著脚讃曰道道道道説著可笑天地我人一家一竅天尊言道者以誠而入以黙而守以柔而用用誠似愚用黙似訥用柔似拙夫如是則可與忘形可與忘我可與忘忘入道者知止守道者知謹用道者知微能知微則慧光生能知謹則聖智全能知止則泰定安泰定安則聖智全聖智全則慧光生慧光生則與道爲一是名眞忘惟其忘而不忘忘無可忘無可忘者即是至道道在天地天地不知有情無情惟一無二註曰道者乃三界所由之路也然入則有由守必有方其用固有理也蓋道乃天地無爲之稱即人之眞常也誠者端恪不移無妄之理也故惟以無妄之誠而入於眞常之道然眞常之道悟者自得故黙識心融而後能守雍容不迫而後能用夫入不能守則非所謂入守不能用則非所謂守故用眞實者如愚而黙雍和而不剛暴是亦如拙者何異焉然其爲愚訥拙也特如之而己亦豈眞愚訥拙哉人能入之守之用之如是者則不特可與忘物而亦可以忘我至於物我俱忘亦忘其所謂忘矣何言乎忘形我者心不之動湛然常寂無彼此之間也知者識之明者見之眞之謂也入道而知止守道而知謹則固循於道而不離用道而知微則能反約而不惑於逺大此其道體之本原在是而一心之妙用所由生也則凡所謂無所不通無所不知乃本性之所具者至此亦復全於我矣原其所自則又皆本諸知止知止而後有定定而後能靜靜定日天聰明日全天光内燭心純乎道與道合眞抑不知孰爲道孰爲我但覺其道即我我即道彼此相忘於無忘可忘之中此所謂至道也至道在乎天地之間而反不知其道之所在要知道者則凡有情之物我蠢動無情之山河草木豈出於至純而不雜之外耶其惟抱一爲天下式者知此凡人修眞鍊道帷守一而不雜則進德無魔昇舉有日也義曰此章乃玉清眞王入道守道體道之端緒也奉玉樞大教之志士於此再三研窮自有所得則玉清眞王之語不虚設矣釋曰大道無言有言非道是故我天尊言前章至道深窈不可得聞也若此之論後人皆不被天尊之化其道有起有止無見無聞起止見聞皆由心造昔我天尊九炁生而九炁成有何見耶有何聞耶此章乃天尊教學道修眞之士用功守成之路必以己誠而合天地之誠也蓋誠者一也夫道一而生二二生三三生萬物莫不自誠一而來者人能用誠而入用黙而守用柔而用然後得誠者似愚得黙者似訥得柔者似拙誠黙柔爲體爲用愚訥拙爲道爲玄如是方可與道混然忘形忘我忘忘此乃道之實而眞之妙也入必要知止守必要知謹用必要知微知微者則九炁之光足矣能知謹者則萬靈之聖全矣能知止者則三元之神安矣神安則智必備智備則靈光生靈光生則本元之炁合矣故名之曰眞忘帷其忘而不忘忘無可忘者即是眞一之大道也讃曰守一守一當用謹黙無我無人却有一賊若還捉住湛然凝碧天尊言吾今於世何以利生爲諸天人演此妙寳得悟之者俾躋仙阼學道之士信有氣數夫風土不同則禀受自異故謂之氣智愚不同則清濁自異故謂之數数繫乎命氣繫乎天氣數所囿天命所梏不得眞道愚可以智濁可以清惟命俾之愚昏昏濁㝠㝠亦風土稟受之移之天地神其機使人不知則曰自然使知其不知則亦曰自然自然之妙雖妙於知而所以妙則自乎不知然於道則未始有以愚之濁之諸天聞已四衆咸悅註曰凡人生處若土厚水深地氣多寒萬物晚成造化之功厚故多壽也若土薄水淺地氣多熱萬物速成造化之功薄故多夭也此風土不同禀受之異也若人稟胎氣清者爲人慈善端正忠孝智慧聰明樂仙慕道之人也禀氣濁者爲人兇惡邪佞狠毒愚癡悖逆無道不仁不義之人也智愚不同清濁之異也氣數所囿如花木之開發亦各有時皆禀天地之氣天命所梏乃天令施於桎梏不善之人長淪惡趣不得眞道也愚者可以智慧門化之濁者可以清淨門化之愚者常自昏昏濁者常自㝠㝠此乃自然而然也皆風土禀受之分配定矣蓋天地之生殺萬物亦隨其四時之氣候也若智人得五行之氣隂陽之精修之鍊之以保固其身命便與天地同久日月齊明愚人只知聲色滋味而不知反以害其命也是以學道之人當黙而思之義曰天之生物皆得二氣之威形清氣多而賢淑濁氣重而姦惡豈非風土之不齊禀受之自異者也釋曰夫風土之不齊實氣數之所繫也是故我天尊舉此一章列大道之後者何也蓋世人失於調飬肆意輕生孰不知輕清之氣爲天重濁之氣爲地凡爲人身得天氣成精成津成液得地氣成骨成肉成筋者也既禀二氣而生何故有修短賢愚之分耶豈非風土之厚薄隂陽之偏塞耶蓋天之命如梏氣之數如囿言人人不可逃天命而越氣數惟我學道之士能崇此經則出於天命而拔氣數之外也我天尊說是言畢兩班卿師使相諸天帝君雷師皓翁踊躍讃歎至於天龍鬼神亦皆不知手舞足蹈之悅也讃曰風土所宜亦由氣血水各有源人皆有劫輕清還玄重濁不白道本無二此心似月天尊言吾今所說即是玉樞寳經若未來世有諸衆生得聞吾名但㝠心黙想作是念言九天應元雷聲普化天尊或一聲或五七聲或千百聲吾即化形十方運心三界使稱名者咸得如意十方三界諸天諸地日月星辰山河草木飛走蠢動若有知若無知天龍鬼神聞諸衆生一稱吾名如有不順者馘首刳心化爲微塵註曰夫玉樞者即玉清之氣也玉爲至尊至貴故元始天尊稱玉清昊天上帝稱玉皇太上道君稱玉晨太上老君稱髙上玉帝也三清之都號玉京神霄眞王稱玉清玉者寳中之尊貴也樞者天之樞紐也雷霆者天地之樞機天樞地機樞隂機陽天本陽曰樞者乃顚倒之理也雖曰天陽地隂蓋天一生水也北斗貪狼星號樞星貪狼配天元乃七政之首也如樞宻院亦朝綱之樞機也總國之機宻政務掌殺伐之目也玉樞之經乃天府之雷文也如有不順之人當刳心斬首皆在雷司之主令也義曰天尊以好生之心爲心化形十方不使一物不被其澤也如有毀謗之者雷司馘首刳心宜矣釋曰此章天尊發廣大之願明矣天尊念念生生無文可明故垂玉樞之靈文以化衆生其或衆生得化成眞之後一稱我天尊之號篆天尊之符至於世間山河草木飛走蠢動但禀二氣之物即當悚爾而聽毋敢少逆如不順者雷司不容則碎爲微塵也讃曰天尊天尊發願廣大毁謗玄文雷司有害天尊言吾是九天貞明大聖毎月初六及旬中辛日監觀萬天浮遊三界若或有人欲學道欲希仙欲逭九玄欲釋三災當命正一道士或自同親友於樓觀於家庭於里社釂水饋花課誦此經或一過三五過乃至數十百過即得神清氣爽心廣體胖凡所希求悉應其感註曰天尊號貞明大聖夫貞者貞觀其天地貞勝其吉凶而乃天地變化聖人效之吉凶垂象聖人則之夫易乾元亨利貞貞者四時爲冬四方爲北令亦屬北天一生水玉清之祖氣也天尊毎月初六及辛日下降初六者六陽降而生乾六隂勝而生坤消息升降周流六虚以爲道極聖功生焉神明出焉蓋天地生數一成數六天地得之潤澤濟世六辛者天之水數天數當先號六辛辛數乾天也天一生水皆先天一氣之義萬天者自大羅清微禹餘大赤王境之天周徧諸天無不監觀其天人功過至于三界無不浮遊察録其萬靈功過也若人誦此經者凡所希求悉應其感義曰天尊言有情無情有知無知咸得成眞以宣大化自見其功德不可稱量也叩之必應奉道之人可不勉哉釋曰天尊降監之日恐世人不知誤犯天律天尊惜羣生之念至於如此如或學道希仙之士酌水獻花或親友或道士一誦此經其得仙班有位天府標名或有一等下愚忽起誠心課誦此經使之心廣體胖或有孝子顺孫齋心滌慮建置壇場請誦此經即得超昇所以釋三災逭九玄皆得如願無不感應讃曰誠不用物以氣相臻一稱尊號天地回春天尊言身中九靈何不召之一曰天生二曰無英三曰玄珠四曰正中五曰子丹六曰回回七曰丹元八曰太淵九曰靈童召之則吉身中三精何不呼之一曰台光二曰爽靈三曰幽精呼之則慶五心煩懣六脉搶攘四肢失寧百節告急宜誦此經註曰九靈者人身中之本神也天生者玄牝也無英者嬰兒也玄珠者谷神也正中者泥丸夫人子丹者靈臺神也回回者貴券神也丹元者心神也太淵者腎宮列女水府神也靈童者主制五臟神也台光者男女搆精胞胎始榮爽靈者魂也幽精者魄也凡爲人既知身中有此神靈何不時時呼召鍊成一家則學道希仙無諸障礙也若五心煩懣六脉搶攘誦此經則身中諸神咸得以寧則使人安逸也義曰三精九靈非外物也住我本家愼勿放出當令常侍左右朝眞禮聖則易見而易得也乃天尊恐人不知大道所在故以此指之也釋曰天有九曜人有九靈天有三台人有三魂天之九曜失度三台遷位則水旱隂晦人之九靈失守三魂妄行則災害生矣如有此三者至心誦經焚符則三魂安九靈息五心靜六脉和四肢泰百節無恙也讃曰九靈九靈是我之精時時呼召永保長生天尊言若或有人五行竒蹇九曜嶔㠌年逢刑衝運值剋戰孤辰寡宿羊刃劒鋒劫煞亡神鬼門鉤絞禄遭破敗馬落空亡動用凶危行藏坎𡒄即誦此經上請天官解天厄地官解地厄水官解水厄五帝解五方厄四聖解四時厄南辰解本命厄北斗解一切厄註曰凡人五行不通九曜失度又值刑衝及諸神煞動用行藏皆不順利大則天譴地責䘮身隕命皆由三官五帝四聖二斗以主之歸命此經誦呪焚香告符則一切厄難皆能解釋義曰三界之中爲人最靈不知向上一歩致使星辰戰剋行止轗軻急宜歸奉眞文則三元五帝以消其罪也此章天尊令人知忌避而欲禳之釋曰此言人之五行不利九曜作撓是也所以諸多神殺皆聽我天尊之勑如或有人遭此禍患誦此經則天尊命本人之家司命六神上請天官解天厄地官解地厄水官解水厄五帝解五方厄四聖解四時厄南辰解本命厄北斗解一切厄蓋縁此三官五帝四聖南辰北斗亦乃天尊之有司也故云上請者欲人知天尊之所司之廣設也讃曰地網天羅不可逃凶星臨併若爲消誠心誦取天尊號玉篆金符急急燒天尊言沉痾伏枕痼疾壓身積時弗瘳求醫罔效五神無主四大不收或是五帝三官之前泰山五道之前日月星辰之前山林草木之前靈壇古跡之前城隍社廟之前里巷井竈之前寺觀塔樓之前或地府三十六獄㝠官七十二司有諸冤枉致此牽纏或盟詛呪誓之所招或債垜負償之所致三世結釁異劫興仇埒其咎尤厙其執對皆當首謝即誦此經註曰沉痾痼疾伏枕牀蓐醫禱無效蓋三官五帝泰山岱嶽日月星辰城隍社廟里巷井竈靈壇古跡寺觀塔樓五道諸司地府㝠官至於山川草木皆有神祇故誤冒犯或夙有冤牽負財致命或被人呪詛或自設誓違盟累劫以來興仇結釁皆當悔過發露罪尤請誦經呪焚此篆符而悉得消愈也義曰此章專言人之積病及禁忌相刑當稱天尊之號則禍去而福來何必疑也釋曰凡人病染沉痾痼疾弗瘳世藥無功隂神作撓或自呪或他詛或積垜或私愆則㝠府欲問究由欲追執對何以赦免即誦寳經焚靈符即時安逸也讃曰隂譴陽罪沉痾是報禁忌犯之經符是禱天尊言天官符地官符年月日時各有官符方隅向背各有官符大則官符小則口舌是有赤口白舌之神以主之凡諸動作興舉出入起居不知避忌如遇官符口舌則使人擊聒暁夜煎煼多招唇吻面是背非動致口牙盟神詛佛始於謗讟终於詬詆由是獄訟生焉刑憲存焉若欲脱之即誦此經遂得口舌潜消官符永息註曰此章天尊言諸官符赤口白舌之神者乃天省下之惡曜也蓋因世人不修正道不畏公法瀆雷䙝雨故遣此神以撓之若人犯者急誦此經焚諸符篆即得應時消滅矣義曰人之行藏各有可否但自不能識其機而造其理也如或犯之此經能免也釋曰天尊發願廣大施化無方此章専言諸官符者蓋此神易犯難釋以致庶人一或干之則赤口白舌乗勢而生也而世人何不預誦寳經焚玉篆則此禍自滅矣讃曰天符地符人不可觸欲釋訟凶經篆三告九天應元雷聲普化天尊玉樞寳經集註上九天應元雷聲普化天尊玉樞寳經集註下海瓊白眞人註祖天師張眞君解義五雷使者張天君釋純陽孚佑帝君讃天尊言土皇九壘其司千二百神土侯土伯土公土母土子土孫土家眷屬若太歲若將軍若鶴神若太白若九良若劒鋒若雌雄若金神若火血若身黃若撞命若三煞若七煞若黄旛豹尾若飛廉刀砧如是等土家神煞若人興修卜築一或犯之即致病患以迄喪亡巉謂此經則萬神皆起天無忌地無忌隂陽無忌百無禁忌註曰凡人動作興工不無有犯神煞其禍立至大則喪命小則官非可不愼歟依儀書篆行持誦經祈禱則百無所忌也義曰天尊惜羣生至於如斯也亦云生亦土而死亦土殊不知土之爲害大尤甚也蓋土宜靜不宜動之謂也釋曰天覆其地人孰不知蓋我天尊爲九天之尊統制三界而九壘皇君眷屬家臣諸多惡煞害人不輕天尊用玉文寳篆以鎭禳之使世間上士下愚凡動作之時百無禁忌也讃曰萬物皆從戊己來偶然相犯即爲災若非普化眞文力處處皆爲白骨堆天尊言世人夫婦其於婚合或犯咸池或犯天狗三刑六害隔角交加孤隂寡陽天羅地網艱於嗣息多是孤獨若欲求男即誦此經當有九天監生大神招神攝風遂生賢子於其生産之時太一在門司命在庭或有冤愆或有鬼魅或有禁忌或有凶厄致令難産請誦此經即得九天衞房聖毋黙與抱送故能臨盆有慶坐草無虞凡有嬰孩在於襁褓爲栴檀神王座下一十五種鬼加諸惱害因多驚癎宜誦此經註曰世人婚合産育皆有神煞不知方向不避太歲偶爾犯之其禍不淺急宜誦經焚符以禳之則自安榮也義曰凶吉兩途互相齒之如或不諧不育天尊之號宜誦之必自然而釋矣釋曰此章爲人間婚姻子嗣係於天尊所屬凡嗣息聘嫁飬育非小事也世俗罔知而窒於勘合之私其誤多矣如或犯之夫北妻南子息艱得宜誦寳經焚靈符以釋之則自然夫妻和睦子孫昌泰也讃曰夫婦人倫事兒男骨肉恩要令家道睦歸敬玉樞文天尊言若人居止鳥鼠送妖蛇蟲嫁孽抛磚擲瓦驚雞弄狗邀求祭祀以至影脅夢逼及於姦盜而敢據其所居以爲巢穴遂使生人被惑庭户不清夜嘯於梁晝瞰其室牛馬犬豕亦遭瘟疫禍連骨肉災及孳生淫祠祅社黨庇神姦弔客頻仍喪車疊出若誦此經即使鬼精滅爽人物咸寜註曰蓋此等之家不崇綱常理道不畏天地神明口味厭穢葷羶身履邪淫殺道不遵公法惟務私榮肆毒逞兇恣行不善是致鬼妬神憎祅邪競起若能悔過首謝誦經焚符即得禍亂不生人物安寧也義曰壁壞盜入業重鬼來致使六畜興災家神不利天尊不以小故亦垂大恩多誦經文其禍止矣釋曰正氣如天邪魔敢犯蓋因世人治家不理干瀆神聦以致六神不居則邪氣乗間而入或鼠精蛇魈拋擲驚弄血隂無時甚至染昩家人其禍不測或盜人家財物移東易西皆此類也致使弔客喪門挾靈肆忘即誦寳經焚玉符則人物俱得以安寧也讃曰自作惡時邪亦作我行善處即天行世人忽有如斯難宜篆靈符誦寳經天尊曰九天雷公將軍五方雷公將軍八方雲雷將軍五方蠻雷使者雷部總兵使者莫賺判官發號施令疾如風火有廟可伐有壇可擊有祅可除有祟可遣季世末法多諸巫覡邪法流行隂肆魘禱是故上清乃有天延禁鬼録姦之庭帝由束祅考邪之房能誦此經其應如響註曰經中凡二十一叚皆天尊言惟此章云天尊曰蓋稱揚雷公將軍使者判官發號施令應響威德故不直言也巫覡之徒務行邪術安搆妖言魘禱夫婦分離蠱媚女流苟合值此妖巫誦寳經焚符篆則雷司勦除應報如響人得安寜義曰天地無私惟德是輔善惡之報動如影響學道之士體天心而明己心則禍患蠲消而福禄臻矣釋曰此章乃天尊自賛雷司之聖也如此所以誅鬼斬邪興雲降雨皆我天尊勑下方行今世道俗難分或以不正之術壞人倫而犯天律誦此寳經焚符則立應如響豈不敬乎畏乎讃曰雷司明善惡善拔惡常誅邪法相侵害惟多誦玉樞天尊言天瘟地瘟二十五瘟天蠱地蠱二十四蠱天瘵地瘵三十六瘵能誦此經即使瘟㾮清淨蠱毒消除勞瘵平復亦有其由或者先亡復連或者伏屍故氣或者塜訟墓注或者死魂染惹或者屍氣感招凡此鬼神或悲思或恚恨牽連執證並縁注射並音塝射音石乗隙伺間間音諫乃得其便故此經者上通三天下徹九泉可以追薦魂爽超度祖玄太上遣素車白馬大將軍以監之註曰凡人患瘟蠱瘵疾者皆有所致甚至絶滅一門牽連六親若能誠心誦經焚燒符篆則雷司差素車白馬之將以拔之使人不陷此苦也義曰瘟蠱瘵疾有自來矣但能誠心潔己誦眞文禮天尊則不罹此苦也釋曰瘟乃不正之氣蠱乃無影之蟲瘵乃難愈之疾蓋此三者我天尊之言有自來矣秖縁復連相染屍氣相薫塜訟相呼之所致也復連者乃人之大厄也世人不知禳解故有絶門亡沒者也塜訟者七祖冤牽之所致也屍氣者地上原有遠年棺柩化成小蟲或飛入飲食之中或落在器皿之内食之令人作蠱凡人遷居當誦經焚符以勦絶之讃曰天地瘟蠱瘵疾大苦禍有其由亦人自取若誦玄文可拔七祖白馬將軍能爲作主天尊言若或有人治裝遠行賊盜騁姦五兵加害陸行則虎狼魈蜮磨其牙水行則蛟龍𪓣鼉張其頣或難賴有幽枉之魂或風濤有劫數之會前亡後化捉生代死能於此經歸命投誠故得水陸平康行藏恊吉註曰凡人岀陸遇賊迎兵或逢蛇虎惡蜮山魈水行或值蛟龍鼋鼉作浪興風滯魄沉魂求生捉替或遭劫會或飄墮他方常預備符篆防之可水可火化去亦急誦寳號立免諸厄也義曰岀入動靜宜愼宜謹若能平昔奉持此經則此患何由而至也釋曰動靜行藏須當愼之所以吉凶晦吝生乎動是故一動只一吉字其三字皆非美也出入可不謹乎凡欲逺行必須先誦寳經佩符命則吉無不利讃曰水陸行藏世不無鬼神作耗暗潜圖一稱普化天尊號佩帶眞王玉篆符天尊言亢陽爲虐雨澤愆期稽顙此經應時甘澍積隂爲厲雨水浸淫稽顙此經應時朗霽祝融扇禍飛火民居赤鼠遊城驚爇黎庶此經可以禳之海若失經魚鼈妄行洪水稽天民生墊溺此經可以止之註曰此章天尊愛羣生之心切切久旱久陰實天地之氣不和乃人民之業難釋以致三界震怒水澇山崩祝融扇禍赤鼠興祅黎庶不安若人遭此嵗時宜誦此經焚此符篆晴雨得宜人民自安也義曰陰陽失律如旱逞勢莫非出入於天司之令蓋惡業之氣不消正眞之道不崇也天尊斡旋造化以生生之心長飬羣品其不可讃歎耶釋曰隂晴晦明非細事也上繫天庭下關洞府亦由二氣之不和故也凡遇此水旱之時志士嚴置道場誦靈文而焚玉篆則旱可雨而雨可晴矣讃曰水旱爲災可關天地誠心誦經睛明甘霈天尊言世人欲免三災九横之厄即於靜夜稽首北辰北辰之上上有三台其星並躔形如雙目疊爲三級以覆斗魁是名天階若人見之生前無刑囚之憂身後不淪没之苦斗中復有尊帝二星大如車輪若人見之留形住世長生神仙歸命此經投心北極即有㝠感斗爲天樞中有天罡在内則爲廉貞在外則爲破軍雷城十二門並隨天罡之所指罡星指丑其身在未所指者吉所在者凶餘位皆然若人見之壽可千歲註曰北辰者北極星也辰星五位乃帝座星也居常不動而衆星皆共之也此北斗居天之中爲天之樞紐斡運四時凡天地日月五星列曜六甲二十八宿諸仙衆眞及下元生人上自天子下及黎庶壽禄貧富生死禍福幽㝠之事無不屬於北斗之總統也太上授以天師張眞君北斗經訣若有危厄急告北斗禮誦本命眞君方獲安泰又得三台生三台飬三台護也三台星有六座上中下台名天階者太上昇降之道也其勢橫亘北斗第二𩲃星上台虚精中台六淳下台曲生乃星君内諱知星名者衆惡消除諸善備至見星象者生無刑憂死無諸苦凡於靜房端坐思三台覆頭次思兩腎氣從胷岀與三台相連久久思畢啄齒二七鼻微微出氣閉口滿咽而畢乃呪曰節節榮榮願乞長生太玄三台常覆我形出入徃來萬神携榮歩之五年仙骨自成歩之七年合藥皆精歩之十年上昇天庭急急如律令可叩頭瞻仰拜禮則百事皆遂又北斗乃隂陽之精神也精曜九道光䕃十天七現二隱世人惟見七星不見尊帝二星此二星即輔弼帝皇太尊晨君乃天地魂魄之威神輔星主天曰常弼星主地曰空空者九天之魂精常者九地之魄靈天休地泰空常隱藏天否地激空常煥明變化萬氣攺易隂陽四時代謝莫不由焉二星尊貴隱伏華晨九天亦祕其靈音不行於世諸得道髙仙貴眞乃得見之其營名逐利流俗穢濁之人星光所不臨照難可得見也曩亦有誤見之者今俗人脫有誤見者切不可言泄則身被兵火卒形獲考地獄生死父母皆受罪於三官瞻禮之法常以每月初三日二十七日夜勿令人知隂下中庭燒香禮誦呪曰尊帝二星北極之靈願臣早見見即長生福慶無窮天與長齡誠心更念此經黙有感通久久自當見也亦不可泄其天罡名在斗樞之内星形與破軍星相對此星紅色稍大每一時辰隨斗杓照臨地支一方位時時運轉無有停息經云天罡所指晝夜常輪是也雷城按地支有十二門雷欲發聲却隨天罡其時所指方位之門乃發聲也且如天罡坐於未對指丑宮何故却有吉凶蓋天罡正氣能生能殺若所指向之處即是生方故有生氣取之則可以治病補虚安神旺氣却禍消災延生度厄也所在之處則有殺氣用之可以斬鬼驅邪夷兇禁暴馘毒制魔故曰所指者吉所在者凶也義曰九曜三台乃一身之主宰爲萬象之樞機也學者當依法而朝奏之無不應響釋曰三台之星尊之大之其斗中二尊帝之星者何也乃天地之魂魄造化之樞機也矢學道之士徒知朝眞禮斗之誠而不解瞻仰尊帝二星之捷徑也又有天罡之星在北斗之後隨雷門開處而指雷門十二者乃十二時經旨明言所指者吉所在者凶即是雷門也學者欲朝斗瞻星則法見於註内見之則人壽永而福厚也讃曰玄門之妙人言深奥功行成時當朝九曜天尊言世衰道微人無德行不忠君王不孝父母不敬師長不友兄弟不誠夫婦不義朋友不畏天地不懼神明不禮三光不重五榖身三口四大秤小斗殺生害命人百已千姦私邪淫妖誣叛逆從微至著三官鼔筆太一移文即付五雷斬勘之司先斬其神後勘其形斬神誅魂使之顚倒人所鄙賤人所嫌害人所怨惡以至勘形震屍使之崩裂驅其捲水役其驅車月覈旬校復有考掠一聞此經其罪即滅若或有人爲雷所瞋其屍不舉水火不受即稱九天應元雷聲普化天尊作是念言萬神稽首咸聽吾命註曰人一有犯理應誅滅豈雷司天府一一轟之即今伏法遭刑刀兵水火但死於非命者皆是也蓋人始以小惡爲之不改日積月増遂成大咎罪已彰著又不悔悟三官太一考覈文移五雷之司先斬神魂伺其時至然後施行其死魂却聽雷司驅役捶考也若人攺過遷善歸命此經其罪即滅凡有男女爲雷所瞋冠幘鬚髮不被燎去亦可歸告天尊取自聖裁萬神皆聽其命令也義曰三綱五常乃萬古不易之理豈容悖逆而妄行耶穀乃民之命國之寳豈可不珍惜而愛護耶近世淺薄不忠不孝不義不仁崇奢侈而惡清淡賤道德而習姦詐致使横禍疊至何不思之天尊幸開大路宜履之行之則諸惡不生矣釋曰人生天地之間禀二氣備五常履仁義而守忠孝何故恣意輕生爲諸不道之事大則雷司震怒暴屍於市小則官府加刑於身是故善可爲而惡不可作也雷司以不仁之人驅役作善之士自當保拔也如有稱天尊之號者則萬神無有不拱聽者也讃曰忠孝當爲本隂陽即我家要消諸惡業不必誦南華天尊言此經功德不可思議徃昔劫中神霄玉清眞王長生大帝所曽宣説至士授經皆當剸金置幣盟天以傳雷師皓翁長跪拜興重白天尊言是經在處當令土地司命隨所守䕶雷部按臨以時稽審若人家有此經至誠安奉即得祥煙滿庭慶雲䕃軒禍亂不萌吉福來萃於其亡没不經地獄所以者何死即徃生生歸善道承天尊力有此靈通出入起居佩帶此經衆人所欽鬼神所畏遇諸險難一心稱名九天應元雷聲普化天尊悉得解脫註曰天尊發大慈悲說是寳經上利諸天下濟羣品至士受經必用金帛爲信以質其心告盟十天然後傅付其金帛者但欲質心盟天豈較多寡金帛雖微盟約實重大聖非吝惜而不普及恐人輕慢故諄切以諭雷師宜令土地司命在處守護也若人侍奉天尊持誦經號致感聖眞降庭故祥雲繚繞生奉眞詮則死歸善道更能依式篆符書寫此經至誠佩帶諸難不生人神敬畏也義曰此章之意令人誠信不欺後學君子當依經而行則庶幾其不差也釋曰雷師皓翁拱聽天尊至化喜不自勝於是長跪再白天尊曰自今而後至士受經當以金帛盟心以傳其文是經在處宜令土地司命隨所守護雷部按臨以時稽審如此奉誦則門庭有慶宗祖超昇佩帶之者人所欽敬鬼神畏服遇難則稱誦天尊之號悉得解脱故此經功德則不可思議也讃曰不貴黄金貴赤心初眞學道外魔侵至誠肯與盟天地剋日教君聽玉音於是雷師皓翁對天尊前而説偈曰无上玉清王統天三十六九天普化君化形十方界披髮騎麒麟赤脚躡層冰手把九天炁嘯風鞭雷霆能以智慧力攝伏諸魔精濟度長夜魂利益於衆生如彼銀河水千眼千月輪誓於未來世永揚天尊教時雷師皓翁說是偈已註曰此章雷師皓翁頓有所得故說是偈以稱揚天尊好生大徳之萬一所以文義溜亮語言華澤其功德力可勝言哉義曰天尊之德無可以體雷師皓翁故以銀河喻之乃言其天尊之元氣至清至貴至聖至明者也釋曰雷師皓翁心服神通無以賛歎遂作此偈然我天尊所統三十六天之尊化十方世界之廣遊諸天時披紺髮而騎麒麟破九泉時赤其足而躡層冰手把九天炁者即金光明之如意也嘯風鞭霆乃天尊之號令也斬鬼除妖濟物利人此乃天尊利益於衆生也銀河之水人不可見不可測之玄玄也千眼千月輪者使諸有情歸教之士猶如天尊之在目前也發願廣大永闡天尊之教讃曰賛歎天尊誠哉是偈普化無邊祖劫一氣天尊言此經得世世人未如吾今所治九天應元府府有九天雷門使者以紏録典者廉訪典者佐之復有四司一曰掠剰司二曰積逮司三曰幽枉司四曰報應司各有大夫以掌其事吾之所理卿師使相咸賛元化註曰天尊自言所治之司官兵將吏善惡各付其職所以生殺之樞皆由天尊之命令三界萬靈莫不皆奉行也義曰此章天尊自言善惡功業各有所司皆賛成元化也釋曰此章經問已畢慮後學之士不知所治之屬所以列言凡所祈求諸司官吏將兵聞吾之號令咸賛元化也讃曰設司分屬掌雷霆風火飛廉號令明善賞惡誅如影響九天元不順人情天尊說是經畢玉梵七寳層臺天花繽紛瓊香繚繞十方諸天帝君咸稱善哉天龍鬼神雷部官衆三界萬靈皆大歡喜信受奉行註曰說經已矣諸天帝君雷部鬼神悉皆賛歎踊躍而去凡我同志信士善人得遇寳經當洗心滌慮至誠朗誦眞文則禍難不萌永保長生者也義曰宣經賛化三界十方皆得如意夫學者得遇寳經玉篆可齋心滌慮酌水獻花如法誦之篆之則諸禍不生衆善駢集也今至士體天心而洗己心閱眞文而造玄文豈可不盡力奉持以廣大其化也哉釋曰寳經玉篆非奉三清上境之勑玉清眞王之令則不能垂示於世而化諸有情者也今經旨校正註釋分明玉篆金章燦然爍目凡祈請之士可不齋心潔滌以閱玄文也耶至士道齡職守都功位居左院用己神元結之英成天尊普化之德是日文成沗列聖眞之左而誦經者不可䙝凟大則天誅小則禍及也讃曰寳經圎满咸稱善哉消災赦罪禍去福來九天應元雷聲普化天尊玉樞寳經集註下圓滿吉祥靈章向來誦經念念存誠千眞拱聽萬聖通靈應元合無普化分形九天有命三界遵行消災謝過請福延生功圓行滿大道證明符篆凡書一篆當焚香起大敬心至誠課誦自正經首至於三章并所祈本章畢然後心存天尊寳相口誦天皇神呪書之常時仍用黃紙貼護篆文用則展啓以後符文一體如之學道希仙第一章召九靈三精第二章遇本命生辰嚴修齋戒誦經稱號書篆焚之解五行九曜剋戰刑衝第三章沉痾痼疾呪詛冤牽第四章消口舌唇吻第五章禳土皇神煞禁忌第六章求嗣息衞産難保嬰孩第七章滅鳥妖蛇孽第八章遣崇除妖滅邪巫魘禱第九章消除蠱瘵超度祖玄第十章水陸行藏第十一章禱雨祈晴止禳水火第十二章瞻呈禮斗第十三章聞經滅罪第十四章佩奉萃福人欽鬼畏第十五章續婚合章凡有嬰孩在於襁褓爲栴檀神王座下一十五種鬼加諸惱害因多驚癎宜誦此經謹按釋藏護諸童子經中載栴檀神王座下一十五種鬼形常遊行世間恐怖嬰孩及小兒作諸怖畏之相人能誠心誦經焚符則免此禍也第一名彌洲迦鬼形如牛著諸小兒眼晴回轉第二名彌迦王鬼形如師子著諸小兒數數嘔吐第三名騫陀形如鳩摩羅天怖諸小兒其兩肩動第四名阿波悉魔羅形如野狐著諸小兒口中沫岀第五名牟致迦形如獼猴著諸小兒把拳不展第六名魔致迦形如羅刹女著諸小兒自囓其舌第七名閻彌迦其形如馬著諸小兒喜啼喜笑第八名迦彌尼形如婦女著諸小兒樂著女人第九名黎波坻其形如狗著諸小兒現種種雜相第十名富多那其形如猪著諸小兒眠中驚怖啼哭第十一名曼多難提形如貓兒著諸小兒眠中喜啼喜笑第十二名舍究尼其形如鳥著諸小兒不肯飲乳第十三名犍吒波尼其形如雞著諸小兒咽喉聲塞第十四名目佉曼茶形如熏狐著諸小兒時氣熱病下痢第十五名藍婆其形如蛇著諸小兒數噫數噦玄陽子所遇雷霆玉經本末如是如是其必有自來矣不以自祕方將梓而廣之其所以與人爲善之志甚蔫予雖未識其爲人固已先識其爲心知其非尋常人也雖然至道無言至言無跡神而明之存乎其人子既有得於言語文字中矣推致其功乃復有得於言語文字外無寜使人謂子爲泥象執文者是則予之至望也子其勉之至順癸酉上元日嗣三十九代天師太玄子書
